services:
  app:
    build: .
    ports:
      - "3051:3051"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PORT=3051
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  redis-data:
