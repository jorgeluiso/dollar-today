services:
  app:
    build: .
    ports:
      - "3051:3051"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PORT=3051
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3051/json').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 60s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  redis-data:
